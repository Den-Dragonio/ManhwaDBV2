name: Auto-Scrape Manhwa Data

on:
  schedule:
    # Запускається кожні 2 години
    - cron: '0 */2 * * *'
  # Дозволяє запускати скрапер вручну з сайту GitHub
  workflow_dispatch:

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Створення ключа Firebase (Service Account)
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Перевіряємо чи секрет не порожній
          if [ -z "$FIREBASE_KEY" ]; then
            echo "❌ ERROR: FIREBASE_SERVICE_ACCOUNT secret is empty!"
            exit 1
          fi
          echo "$FIREBASE_KEY" > scripts/serviceAccount.json

      - name: Запуск AniList Scraper (Нові тайтли)
        run: python -u scripts/scraper_anilist.py

      - name: Запуск MangaDex Scraper (Статистика)
        run: python -u scripts/scraper_mangadex.py

      - name: Запуск ToonGod Scraper (Нові тайтли)
        run: python -u scripts/scraper.py
