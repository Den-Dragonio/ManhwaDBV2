name: Auto-Scrape Manhwa Data

on:
  schedule:
    # Запускається кожні 2 години
    - cron: '0 */2 * * *'
  # Дозволяє запускати скрапер вручну з сайту GitHub
  workflow_dispatch:

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests beautifulsoup4 lxml

      - name: Створення ключа Firebase (Service Account)
        run: |
          # Цей крок бере секретний ключ з налаштувань GitHub і кладе його у файл
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > scripts/serviceAccount.json

      - name: Запуск AniList Scraper (Нові тайтли)
        run: python scripts/scraper_anilist.py

      - name: Запуск ToonGod Scraper (Нові тайтли)
        run: python scripts/scraper.py
