<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
    <meta name="description" content="ManhwaDB — ваша персональна база рецензій та рейтингів манхв. Знаходьте, читайте та оцінюйте улюблені твори." />
    <title>ManhwaDB — рейтинги та рецензії манхв</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="app-loader">
        <div class="loader-logo">ManhwaDB</div>
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
