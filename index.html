<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="no-referrer" />
    <script>
      (function() {
        const t = localStorage.getItem('theme') || 'system';
        if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else if (t === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        }
      })();
    </script>
    <meta name="description" content="ManhwaDB — ваша персональна база рецензій та рейтингів манхв. Знаходьте, читайте та оцінюйте улюблені твори." />
    
    <!-- Apple PWA Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ManhwaDB" />
    <link rel="apple-touch-icon" href="/public/apple-touch-icon.png" />
    
    <title>ManhwaDB — рейтинги та рецензії манхв</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="app-loader">
        <div class="loader-logo">ManhwaDB</div>
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
